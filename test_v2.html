      function processGamesToJSON(list) {
        // 1. list — это уже массив. Просто чистим пробелы, удаляем дубли через Set, сортируем
        const cleanSortedArray = [...new Set(list.map((g) => g.trim()))].sort((a, b) =>
          a.localeCompare(b),
        );

        // 2. Формируем структуру с ID и добавляем свойство img
        const jsonStructure = cleanSortedArray.map((game, index) => ({
          id: index + 1,
          name: game,
          img: `/covers/${game}.jpg`, // <-- Добавили генерацию пути к обложке
        }));

        // 3. Конвертируем в JSON
        return JSON.stringify(jsonStructure, null, 2);
      }

      // Вызов функции обязательно ПОСЛЕ объявления переменной gamesList
      const finalJSON = processGamesToJSON(gamesList);
